        /** Images: `/api/gallery`. Avatar workshop: Firebase `avatar_workshop_progress` (+ legacy `avatar_workshop_submissions`). */

        function safeHttpHref(url) {
            try {
                const u = new URL(String(url || '').trim());
                if (u.protocol !== 'http:' && u.protocol !== 'https:') return '#';
                return u.href;

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')

                .replace(/"/g, '&quot;');

        function hideDashboardStatus() {
            const el = document.getElementById('statusMessage');
            if (!el) return;
            el.classList.add('d-none');
            el.textContent = '';

        function showDashboardStatus(message, variant) {
            const el = document.getElementById('statusMessage');
            if (!el || !message) return;
            el.classList.remove('d-none');
            const cls = variant === 'warn' ? 'alert-warning' : 'alert-danger';
            el.className = `alert mb-3 ${cls}`;

        hideDashboardStatus();

        const TXT_ACTIVITY_IDS = ['1', '2.1', '2.2', '2.3', '4.1', '4.2'];

        function parseTxtSubmissionFilename(name) {
            if (!name || !name.endsWith('.txt')) return null;
            const base = name.slice(0, -4);
            const parts = base.split('_');
            if (parts.length < 4) return null;
            const slug = parts[parts.length - 1];
            const activityId = parts[parts.length - 2];
            const ts = parseInt(parts[parts.length - 3], 10);
            if (!TXT_ACTIVITY_IDS.includes(activityId) || !Number.isFinite(ts)) return null;
            const userId = parts.slice(0, parts.length - 3).join('_');
            return { userId, ts, activityId, slug, filename: name };
        }

        function parseTxtSubmissionFilenameLoose(name) {
            if (!name || !name.endsWith('.txt')) return null;
            const strict = parseTxtSubmissionFilename(name);
            if (strict) return strict;

            const base = name.slice(0, -4);
            const parts = base.split('_').filter(Boolean);
            if (parts.length === 0) return null;

            const tsPart = parts.find((p) => /^\d{10,13}$/.test(p));
            const ts = tsPart ? parseInt(tsPart, 10) : Date.now();
            const activityPart = parts.find((p) => /^[0-9]+(?:\.[0-9]+)?$/.test(p));
            const activityId = activityPart || '';
            const slug = parts[parts.length - 1] || '';
            const userId = parts[0] || 'unknown';
            return { userId, ts, activityId, slug, filename: name };
        }

        function extractTextFromSubmissionRow(row) {
            if (!row || typeof row !== 'object') return '';
            const keys = [
                'text', 'content', 'submissionText', 'selfIntroduction', 'selfIntro',
                'intro', 'introduction', 'answer', 'response', 'message', 'body'
            ];
            for (const key of keys) {
                const value = row[key];
                if (typeof value === 'string' && value.trim()) return value.trim();
                if (typeof value === 'number' || typeof value === 'boolean') return String(value);
                if (Array.isArray(value)) {
                    const flat = value.map((v) => (v == null ? '' : String(v))).join('\n').trim();
                    if (flat) return flat;
                }
                if (value && typeof value === 'object') {
                    const nestedKeys = ['text', 'value', 'content', 'answer', 'response', 'intro'];
                    for (const nk of nestedKeys) {
                        const nv = value[nk];
                        if (typeof nv === 'string' && nv.trim()) return nv.trim();
                    }
                    const jsonText = JSON.stringify(value).trim();
                    if (jsonText && jsonText !== '{}') return jsonText;
                }
            }
            return '';
        }

        function writtenCardKind(activityId, slug) {
            const aid = String(activityId || '').toLowerCase();
            if (aid === 'heygen_avatar') return 'avatarWorkshop';
            const sid = String(slug || '').toLowerCase();
            if (aid === '2.2' || sid === 'gmail') return 'gmail';
            if (aid === '2.1' || sid === 'selfintro') return 'selfintro';
            return 'other';
        }

        function writtenCardTitle(kind) {
            if (typeof window.getTranslation === 'function') {
                if (kind === 'avatarWorkshop') return window.getTranslation('gallery.cardAvatarWorkshop');
                if (kind === 'gmail') return window.getTranslation('gallery.cardGmail');
                if (kind === 'selfintro') return window.getTranslation('gallery.cardSelfIntro');
                return 'Written submission';
            }
            if (kind === 'avatarWorkshop') return 'AI avatar & tutor';
            if (kind === 'gmail') return 'Gmail';
            if (kind === 'selfintro') return 'Self-introduction';
            return 'Written submission';
        }

        function textCardKey(item) {
            const raw =
                item && item.source === 'firestore' && item.id
                    ? `fs_${item.fbCollection === 'avatar_workshop_progress' ? 'prog' : 'sub'}_${item.id}`
                    : `txt_${String(item.userId || 'u')}_${String(item.activityId || 'a')}_${String(item.sortKey || 0)}_${String(item.text || '').slice(0, 24)}`;
            return raw.replace(/[^a-zA-Z0-9_-]/g, '_');
        }

        let writtenSubmissionCards = [];
        let writtenLoadRequestId = 0;
        const debugState = {
            firestoreRows: 0,
            storageTxtRows: 0,
            mergedRows: 0,
            addedFromFirestore: 0,
            addedFromStorage: 0,
            skippedEmptyText: 0,
            writtenRowsInGallery: 0,
            imagesInGallery: 0,
            errors: [],
            sampleWritten: [],
            sampleRawRows: []
        };

        function updateDebugPanel() {
            const summaryEl = document.getElementById('debugSummary');
            const detailsEl = document.getElementById('debugDetails');
            const tsEl = document.getElementById('debugTimestamp');
            if (!summaryEl || !detailsEl || !tsEl) return;

            summaryEl.textContent =
                `Firestore text rows: ${debugState.firestoreRows} | ` +
                `Storage .txt rows: ${debugState.storageTxtRows} | ` +
                `Merged text rows: ${debugState.mergedRows} | ` +
                `+FS: ${debugState.addedFromFirestore} | +TXT: ${debugState.addedFromStorage} | Empty: ${debugState.skippedEmptyText} | ` +
                `Text cards shown: ${debugState.writtenRowsInGallery} | ` +
                `Image cards shown: ${debugState.imagesInGallery}`;
            detailsEl.textContent = JSON.stringify(
                {
                    sampleRawRows: debugState.sampleRawRows,
                    sampleWritten: debugState.sampleWritten,
                    errors: debugState.errors
                },
                null,
                2
            );
            tsEl.textContent = new Date().toLocaleTimeString();
        }

        function pushDebugError(source, error) {
            debugState.errors.push({
                source,
                message: error && error.message ? error.message : String(error || 'Unknown error')
            });
            debugState.errors = debugState.errors.slice(-10);
            updateDebugPanel();
        }

        function avatarWorkshopTsMillis(d) {
            const keys = [
                'updatedAt',
                'audioSubmittedAt',
                'perplexityLinkSubmittedAt',
                'heygenLinkSubmittedAt',
                'scriptSubmittedAt',
                'createdAt'
            ];
            for (const k of keys) {
                const v = d[k];
                if (v && typeof v.toMillis === 'function') return v.toMillis();
            }
            return Date.now();
        }

        /** Load HeyGen / Perplexity workshop rows from Firestore (progress + legacy submissions). */
        async function loadWrittenSubmissionCards() {
            const requestId = ++writtenLoadRequestId;
            writtenSubmissionCards = [];
            debugState.firestoreRows = 0;
            debugState.storageTxtRows = 0;
            debugState.mergedRows = 0;
            debugState.addedFromFirestore = 0;
            debugState.addedFromStorage = 0;
            debugState.skippedEmptyText = 0;
            debugState.sampleWritten = [];
            debugState.sampleRawRows = [];
            updateDebugPanel();

            const db = getTeacherFirestore();
            if (!db) {
                pushDebugError('firestore', new Error('Firestore not initialized'));
                populateUserFilter();
                filterAndDisplayImages();
                return;
            }

            try {
                const progSnap = await getDocs(collection(db, 'avatar_workshop_progress'));
                if (requestId !== writtenLoadRequestId) return;

                progSnap.forEach((docSnap) => {
                    const d = docSnap.data();
                    const ts = avatarWorkshopTsMillis(d);
                    const scriptText = String(d.scriptText || '').trim();
                    const audioUrl = String(d.heygenTrainingAudioUrl || '').trim();
                    const heygenLink = String(d.heygenAvatarLink || '').trim();
                    const perplexityLink = String(d.perplexityTutorLink || '').trim();
                    const uid = String(d.userId || '');
                    writtenSubmissionCards.push({
                        source: 'firestore',
                        id: docSnap.id,
                        fbCollection: 'avatar_workshop_progress',
                        userId: uid,
                        activityId: String(d.activityId || 'heygen_avatar'),
                        kind: 'avatarWorkshop',
                        scriptText,
                        audioUrl,
                        heygenLink,
                        perplexityLink,
                        sortKey: ts,
                        dateLabel: new Date(ts).toLocaleString(),
                        text: [scriptText, heygenLink, perplexityLink].filter(Boolean).join('\n')
                    });
                    debugState.addedFromFirestore++;
                    if (debugState.sampleWritten.length < 6) {
                        debugState.sampleWritten.push({ id: docSnap.id, userId: uid, src: 'progress' });
                    }
                });

                try {
                    const legQ = query(
                        collection(db, 'avatar_workshop_submissions'),
                        orderBy('createdAt', 'desc'),
                        limit(400)
                    );
                    const legSnap = await getDocs(legQ);
                    legSnap.forEach((docSnap) => {
                        const d = docSnap.data();
                        let ts = Date.now();
                        if (d.createdAt && typeof d.createdAt.toMillis === 'function') {
                            ts = d.createdAt.toMillis();
                        }
                        const scriptText = String(d.scriptText || '').trim();
                        const audioUrl = String(d.heygenTrainingAudioUrl || '').trim();
                        const heygenLink = String(d.heygenAvatarLink || '').trim();
                        const perplexityLink = String(d.perplexityTutorLink || '').trim();
                        const uid = String(d.userId || '');
                        writtenSubmissionCards.push({
                            source: 'firestore',
                            id: docSnap.id,
                            fbCollection: 'avatar_workshop_submissions',
                            userId: uid,
                            activityId: String(d.activityId || 'heygen_avatar'),
                            kind: 'avatarWorkshop',
                            scriptText,
                            audioUrl,
                            heygenLink,
                            perplexityLink,
                            sortKey: ts,
                            dateLabel: new Date(ts).toLocaleString(),
                            text: [scriptText, heygenLink, perplexityLink].filter(Boolean).join('\n')
                        });
                        debugState.addedFromFirestore++;
                        if (debugState.sampleWritten.length < 12) {
                            debugState.sampleWritten.push({ id: docSnap.id, userId: uid, src: 'legacy' });
                        }
                    });
                } catch (legErr) {
                    pushDebugError('avatar_workshop_submissions', legErr);
                    console.warn('Legacy submissions query skipped or failed:', legErr);
                }

                debugState.firestoreRows = writtenSubmissionCards.length;
                debugState.mergedRows = writtenSubmissionCards.length;
            } catch (err) {
                pushDebugError('avatar_workshop_progress', err);
                console.error('Could not load avatar workshop Firestore data:', err);
            }

            if (requestId !== writtenLoadRequestId) return;
            populateUserFilter();
            filterAndDisplayImages();
        }

        function workshopActivityLabel(storageActivity) {
            if (storageActivity == null || storageActivity === '') return '';
            return String(storageActivity);
        }

        function activityLabelById(activityId) {
            const aid = String(activityId || '');
            if (typeof window.getTranslation === 'function') {
                if (aid === 'heygen_avatar') return window.getTranslation('gallery.activityHeygenAvatar');
                if (aid === '2.1') return window.getTranslation('gallery.activity1');
                if (aid === '1') return window.getTranslation('gallery.activity2');
                if (aid === '2.2') return window.getTranslation('gallery.activity3');
            }
            if (aid === 'heygen_avatar') return 'AI avatar & tutor — HeyGen / Perplexity';
            if (aid === '2.1') return '2.1 — Self-introduction (English)';
            if (aid === '1') return '1 — Profile picture';
            if (aid === '2.2') return '2.2 — Self-introduction (Chinese)';
            return aid;
        }

        function getFilteredAndSortedWrittenCards(userFilter, activityFilter, sortOrder) {
            const cards = writtenSubmissionCards.filter((item) => {
                const matchesUser = !userFilter || String(item.userId) === userFilter;
                const matchesActivity = !activityFilter || String(item.activityId) === activityFilter;
                return matchesUser && matchesActivity;
            });

            if (sortOrder === 'oldest') {
                cards.sort((a, b) => (a.sortKey || 0) - (b.sortKey || 0));
            } else if (sortOrder === 'votes') {
                cards.sort((a, b) => {
                    const av = getTextSubmissionVotes(textCardKey(a));
                    const bv = getTextSubmissionVotes(textCardKey(b));
                    if (bv !== av) return bv - av;
                    return (b.sortKey || 0) - (a.sortKey || 0);
                });
            } else {
                cards.sort((a, b) => (b.sortKey || 0) - (a.sortKey || 0));
            }

            return cards;
        }

        let allImages = []; // Store all images data

        function mapGalleryApiImage(img) {
            const name = String(img.id || '');
            const prompt = String(img.prompt || '');
            const url = String(img.url || '');
            const tsIso = img.timestamp;
            let timestamp = tsIso ? new Date(tsIso).getTime() : Date.now();
            if (!Number.isFinite(timestamp)) timestamp = Date.now();

            let userId = String(img.userId ?? 'unknown');
            let activity = img.activity != null && img.activity !== '' ? String(img.activity) : null;
            let type = img.aiType != null && img.aiType !== '' ? String(img.aiType) : 'gallery';

            const filenameParts = name.split('_');
            if (!activity && filenameParts.length >= 3) {
                const validActivities = ['1', '2.1', '2.2', '2.3', '4.1', '4.2'];
                const maybeTs = parseInt(filenameParts[1], 10);
                if (!Number.isNaN(maybeTs)) {
                    timestamp = maybeTs;
                    userId = filenameParts[0];
                    let promptPartsStart;
                    if (filenameParts.length >= 5 && validActivities.includes(filenameParts[2])) {
                        activity = filenameParts[2];
                        type = filenameParts[3];
                        promptPartsStart = 4;
                    } else {
                        type = filenameParts[2] || type;
                        promptPartsStart = 3;
                    }
                    const encodedPrompt = filenameParts.slice(promptPartsStart).join('_').replace(/\.png$/i, '');
                    const derived = decodeURIComponent(encodedPrompt).replace(/_/g, ' ');
                    return {
                        url,
                        name,
                        userId,
                        timestamp,
                        type,
                        activity,
                        prompt: prompt || derived,
                        date: new Date(timestamp),
                        votes: getImageVotes(name)
                    };
                }
            }

            return {
                url,
                name,
                userId,
                timestamp,
                type,
                activity,
                prompt,
                date: new Date(timestamp),
                votes: getImageVotes(name)
            };
        }

        // Function to load all images from this server's gallery API (memory-backed in server.js)
        async function loadImages() {
            hideDashboardStatus();

            try {
                const res = await fetch('/api/gallery');
                if (!res.ok) throw new Error(`Gallery HTTP ${res.status}`);
                const data = await res.json().catch(() => ({}));
                const images = Array.isArray(data.images) ? data.images : [];

                allImages = images.map((img) => mapGalleryApiImage(img));

                if (allImages.length === 0) {
                    const gallery = document.getElementById('galleryContainer');
                    if (gallery) gallery.innerHTML = '';
                    populateUserFilter();
                    filterAndDisplayImages();
                    return;
                }

                populateUserFilter();
                filterAndDisplayImages();
            } catch (error) {
                console.error('Error loading images:', error);
                showDashboardStatus(error.message || 'Error loading images.', 'error');
            }
        }

        let currentImageIndex = 0;
        let filteredImages = [];

        // Make navigateImage function available globally
        window.navigateImage = function (direction) {
            currentImageIndex = (currentImageIndex + direction + filteredImages.length) % filteredImages.length;
            const modalImage = document.getElementById('modalImage');
            modalImage.src = filteredImages[currentImageIndex].url;
        }

        window.openImageModal = function (imageUrl) {
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageUrl;
            // Find the index of the clicked image

        // Function to populate user ID dropdown
        function populateUserFilter() {
            const userFilter = document.getElementById('userFilter');
            const existingOptions = userFilter.querySelectorAll('option');

            // Keep the "All Users" option
            userFilter.innerHTML = '<option value="">All Users</option>';

            // Get unique user IDs from both image and text submissions
            const usersFromImages = allImages.map((img) => String(img.userId || ''));
            const usersFromText = writtenSubmissionCards.map((item) => String(item.userId || ''));
            const uniqueUserIds = [...new Set([...usersFromImages, ...usersFromText].filter(Boolean))]
                .sort((a, b) => {
                    const na = Number(a);
                    const nb = Number(b);
                    if (Number.isFinite(na) && Number.isFinite(nb)) return na - nb;
                    return a.localeCompare(b);
                });

            // Add user ID options
            uniqueUserIds.forEach(userId => {
                const option = document.createElement('option');
                option.value = userId;
                option.textContent = `User ${userId}`;
                userFilter.appendChild(option);
            });
        }

        // Function to delete an image
        async function deleteImage(filename) {
            const currentUserId = localStorage.getItem('currentUserId');

            // Find the image to check ownership
            const imageToDelete = allImages.find(img => img.name === filename);
            if (!imageToDelete) {
                alert('Image not found!');
                return;
            }

            // Allow owner or admin (userId 55) to delete
            const isAdmin = currentUserId === '55';
            if (currentUserId !== imageToDelete.userId && !isAdmin) {
                alert('You can only delete your own images!');
                return;
            }

            hideDashboardStatus();

            try {
                const res = await fetch(`/api/admin/images/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                const body = await res.json().catch(() => ({}));
                if (!res.ok) {
                    throw new Error(body.error || `Delete failed (${res.status})`);
                }
                hideDashboardStatus();
                loadImages();
            } catch (error) {
                console.error("Error deleting image:", error);
                showDashboardStatus(error.message || 'Delete failed.', 'error');
            }
        }

            const allUserTextVotes = JSON.parse(localStorage.getItem('textUserVotes') || '{}');
            return allUserTextVotes[currentUserId] || [];
        }

            if (!currentUserId) return;
            const allUserTextVotes = JSON.parse(localStorage.getItem('textUserVotes') || '{}');
            allUserTextVotes[currentUserId] = votes;
            localStorage.setItem('textUserVotes', JSON.stringify(allUserTextVotes));

        function hasVotedOnTextSubmission(textKey) {
            const votes = getUserTextVotes();
            return votes.includes(textKey);
        }

        function getTextSubmissionVotes(textKey) {
            const textVotes = JSON.parse(localStorage.getItem('textVotes') || '{}');
            return textVotes[textKey] || 0;
        }

        window.voteForTextSubmission = function (textKey, ownerId) {
            const currentUserId = localStorage.getItem('currentUserId');
            if (!currentUserId) {
                alert('Please log in to vote!');
                return;
            }
            if (String(currentUserId) === String(ownerId)) {
                alert('You cannot vote on your own submission!');
                return;
            }

            const votes = getUserTextVotes();
            if (votes.includes(textKey)) {
                alert('You have already voted on this submission!');
                return;
            }
            if (votes.length >= 3) {
                alert('You have used all your text votes!');
                return;
            }

            votes.push(textKey);
            saveUserTextVotes(votes);
            const newVotes = getTextSubmissionVotes(textKey) + 1;
            updateTextSubmissionVotes(textKey, newVotes);
            filterAndDisplayImages();
        };

        window.editTextSubmission = async function (textKey) {
            const item = getTextSubmissionByKey(textKey);
            if (!item) {
                alert('Submission not found.');
                return;
            }
            if (item.kind === 'avatarWorkshop') {
                alert(
                    'This submission type cannot be edited here. Ask the student to submit again from AI Art Studio if changes are needed. / 此類提交無法在此編輯，如需修改請學員於 AI 藝術工作室重新提交。'
                );
                return;
            }
            const currentUserId = localStorage.getItem('currentUserId');
            const isAdmin = currentUserId === '55';
            if (currentUserId !== String(item.userId) && !isAdmin) {
                alert('You can only edit your own submissions!');
                return;
            }
            if (item.source !== 'firestore' || !item.id) {
                alert('Written submissions from Firebase are disconnected. Nothing to edit here.');
                return;
            }
            const nextText = prompt('Edit submission text:', String(item.text || ''));
            if (nextText == null) return;
            const updatedText = String(nextText).trim();
            if (!updatedText) {
                alert('Text cannot be empty.');
                return;
            }
            try {
                alert('Firestore is disconnected; saving edits here is disabled.');
            } catch (err) {
                console.error('Edit text submission failed:', err);
                alert('Failed to edit text submission.');
            }
        };

        window.deleteTextSubmission = async function (textKey) {
            const item = getTextSubmissionByKey(textKey);
            if (!item) {
                alert('Submission not found.');
                return;
            }
            const currentUserId = localStorage.getItem('currentUserId');
            const isAdmin = currentUserId === '55';
            if (currentUserId !== String(item.userId) && !isAdmin) {
                alert('You can only delete your own submissions!');
                return;
            }
            if (item.source !== 'firestore' || !item.id) {
                alert('Nothing to delete here.');
                return;

            if (!confirm('Delete this submission permanently? / 確定永久刪除此提交？')) return;

        // Function to get user-specific votes

            const currentUserId = localStorage.getItem('currentUserId');
            if (!currentUserId) return [];

            const allUserVotes = JSON.parse(localStorage.getItem('userVotes') || '{}');

            const currentUserId = localStorage.getItem('currentUserId');
            if (!currentUserId) return;

            const allUserVotes = JSON.parse(localStorage.getItem('userVotes') || '{}');

        function getImageVotes(imageName) {
            const imageVotes = JSON.parse(localStorage.getItem('imageVotes') || '{}');

        // Function to update image votes in localStorage
        function updateImageVotes(imageName, newVoteCount) {
            const imageVotes = JSON.parse(localStorage.getItem('imageVotes') || '{}');
            imageVotes[imageName] = newVoteCount;
            localStorage.setItem('imageVotes', JSON.stringify(imageVotes));
        }

        // Function to vote for an image
        window.voteForImage = function (imageName, imageUserId) {
            const currentUserId = localStorage.getItem('currentUserId');

            if (!currentUserId) {
                alert('Please log in to vote!');
                return;
            }

            // Check if user is trying to vote on their own image
            if (currentUserId === imageUserId) {
                alert('You cannot vote on your own image!');
                return;
            }

            // Get current user's votes
            const userVotes = getUserVotes();
            const totalVotesUsed = userVotes.length;

            // Check if user has already voted on this image
            if (hasVotedOnImage(imageName)) {
                alert('You have already voted on this image!');
                return;
            }

            // Check if user has used all their votes
            if (totalVotesUsed >= 3) {
                alert('You have used all your votes!');
                return;
            }

            // Add vote to user's voting history
            userVotes.push(imageName);
            saveUserVotes(userVotes);

            // Get current vote count for this image and increment it
            const currentVotes = getImageVotes(imageName);
            const newVoteCount = currentVotes + 1;
            updateImageVotes(imageName, newVoteCount);

            // Update the image object in allImages array
            const imageIndex = allImages.findIndex(img => img.name === imageName);
            if (imageIndex !== -1) {
                allImages[imageIndex].votes = newVoteCount;
            }

            // Update display
            updateVoteDisplay();
            updateVoteButton(imageName, false);

            // Update vote count display immediately
            const voteCountElement = document.getElementById(`votes-${imageName}`);
            if (voteCountElement) {
                voteCountElement.textContent = newVoteCount;
            }

            // Update the vote button to show it's been voted on
            const voteButton = document.querySelector(`button[data-filename="${imageName}"]`);
            if (voteButton) {
                voteButton.className = 'btn btn-sm btn-secondary';
                voteButton.disabled = true;
                voteButton.innerHTML = '<i class="fas fa-check"></i> Voted';
            }

            alert(`Vote recorded successfully! This image now has ${newVoteCount} vote(s).`);
        }

        // Function to update vote display
        function updateVoteDisplay() {
            const currentUserId = localStorage.getItem('currentUserId');
            if (!currentUserId) {
                const votesRemainingElement = document.getElementById('votesRemaining');
                if (votesRemainingElement) {
                    votesRemainingElement.textContent = '0';
                }
                return;
            }

            const userVotes = getUserVotes();
            const votesRemaining = 3 - userVotes.length;

            const votesRemainingElement = document.getElementById('votesRemaining');
            if (votesRemainingElement) {
                votesRemainingElement.textContent = votesRemaining;
            }

            // Update vote status color
            const voteStatus = document.getElementById('voteStatus');
            if (votesRemaining === 0) {
                voteStatus.className = 'alert alert-warning mb-0';
            } else if (votesRemaining <= 1) {
                voteStatus.className = 'alert alert-info mb-0';
            } else {
                voteStatus.className = 'alert alert-success mb-0';
            }
        }

        // Function to update vote button state
        function updateVoteButton(imageName, canVote) {
            const voteButton = document.querySelector(`button[data-filename="${imageName}"]`);
            if (voteButton) {
                if (canVote) {
                    voteButton.className = 'btn btn-sm btn-success';
                    voteButton.disabled = false;
                } else {
                    voteButton.className = 'btn btn-sm btn-secondary';
                    voteButton.disabled = true;
                }
            }
        }

        // Function to reset votes (for testing purposes)
        window.resetVotes = function () {
            const currentUserId = localStorage.getItem('currentUserId');
            if (!currentUserId) {
                alert('Please log in to reset votes!');
                return;
            }

            if (confirm('Are you sure you want to reset your votes? This will clear your voting history.')) {
                // Reset only current user's votes
                const allUserVotes = JSON.parse(localStorage.getItem('userVotes') || '{}');
                delete allUserVotes[currentUserId];
                localStorage.setItem('userVotes', JSON.stringify(allUserVotes));

                // Reset image vote counts
                localStorage.setItem('imageVotes', JSON.stringify({}));

                updateVoteDisplay();
                filterAndDisplayImages(); // Refresh the display
                alert('Your votes have been reset!');
            }
        }

        // Image editing variables
        let currentEditImage = null;
        let currentRotation = 0;

        // Function to open edit modal
        window.editImage = function (imageUrl, imageName, imageUserId) {
            const currentUserId = localStorage.getItem('currentUserId');

            // Allow owner or admin (userId 55) to edit
            const isAdmin = currentUserId === '55';
            if (currentUserId !== imageUserId && !isAdmin) {
                alert('You can only edit your own images!');
                return;
            }

            currentEditImage = { url: imageUrl, name: imageName, userId: imageUserId };
            currentRotation = 0;

            // Set the image in the edit modal
            const editImageElement = document.getElementById('editImage');
            editImageElement.src = imageUrl;
            editImageElement.style.transform = 'rotate(0deg)';

            // Open the edit modal
            const editModal = new bootstrap.Modal(document.getElementById('editImageModal'));
            editModal.show();
        }

        // Function to rotate image
        window.rotateImage = function (degrees) {
            const editImageElement = document.getElementById('editImage');
            currentRotation = (currentRotation + degrees) % 360;
            editImageElement.style.transform = `rotate(${currentRotation}deg)`;
        }

        // Function to reset rotation
        window.resetRotation = function () {
            const editImageElement = document.getElementById('editImage');
            currentRotation = 0;
            editImageElement.style.transform = 'rotate(0deg)';
        }

        // Function to save image changes
        window.saveImageChanges = async function () {
            if (!currentEditImage) {
                alert('No image selected for editing!');
                return;
            }

            if (currentRotation === 0) {
                alert('No changes to save!');
                return;
            }

            // Show loading state
            const saveButton = document.querySelector('#editImageModal .btn-success');
            const originalText = saveButton.innerHTML;
            saveButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            saveButton.disabled = true;

            try {
                await saveImageWithCanvas();
            } catch (error) {
                console.error('Primary approach failed:', error);

                try {
                    await saveImageFallback();
                } catch (fallbackError) {
                    console.error('Fallback approach also failed:', fallbackError);
                    alert(fallbackError.message || 'Could not save rotation.');
                }
            } finally {
                saveButton.innerHTML = originalText;
                saveButton.disabled = false;
            }
        }

        // Primary approach using canvas
        async function saveImageWithCanvas() {
            // Create a canvas to apply rotation
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Create a new image element
            const img = new Image();

            // Set up image loading with proper error handling
            const imageLoadPromise = new Promise((resolve, reject) => {
                img.onload = () => resolve(img);
                img.onerror = () => reject(new Error('Failed to load image'));

                // Try to load the image with CORS handling
                img.crossOrigin = 'anonymous';
                img.src = currentEditImage.url;

                // Fallback: if image is already loaded
                if (img.complete) {
                    resolve(img);
                }
            });

            // Wait for image to load
            const loadedImg = await imageLoadPromise;

            // Calculate new dimensions based on rotation
            let newWidth, newHeight;
            if (currentRotation === 90 || currentRotation === 270) {
                newWidth = loadedImg.height;
                newHeight = loadedImg.width;
            } else {
                newWidth = loadedImg.width;
                newHeight = loadedImg.height;
            }

            // Set canvas size
            canvas.width = newWidth;
            canvas.height = newHeight;

            // Clear canvas and set background
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Move to center and rotate
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate((currentRotation * Math.PI) / 180);
            ctx.drawImage(loadedImg, -loadedImg.width / 2, -loadedImg.height / 2);

            // Convert canvas to blob with error handling
            const blobPromise = new Promise((resolve, reject) => {
                try {
                    canvas.toBlob((blob) => {
                        if (blob) {
                            resolve(blob);
                        } else {
                            reject(new Error('Failed to create image blob'));
                        }
                    }, 'image/png', 0.9);
                } catch (error) {
                    reject(error);
                }
            });

            const rotatedBlob = await blobPromise;

            // Local preview only (no cloud upload after Firebase removal)
            const newUrl = URL.createObjectURL(rotatedBlob);

            // Update the image object in allImages array
            const imageIndex = allImages.findIndex(img => img.name === currentEditImage.name);
            if (imageIndex !== -1) {
                allImages[imageIndex].url = newUrl;
            }

            // Update the current edit image URL
            currentEditImage.url = newUrl;

            // Update the edit modal image
            const editImageElement = document.getElementById('editImage');
            editImageElement.src = newUrl;
            editImageElement.style.transform = 'rotate(0deg)';

            // Refresh the display
            filterAndDisplayImages();

            alert('Image rotation saved as a local preview in this browser tab.');

            // Close the edit modal
            const editModal = bootstrap.Modal.getInstance(document.getElementById('editImageModal'));
            editModal.hide();
        }

        // Fallback approach - just update the display with rotation info
        async function saveImageFallback() {
            // Store rotation information in localStorage for this image
            const imageRotations = JSON.parse(localStorage.getItem('imageRotations') || '{}');
            imageRotations[currentEditImage.name] = currentRotation;
            localStorage.setItem('imageRotations', JSON.stringify(imageRotations));

            // Update the display to show the rotation
            const editImageElement = document.getElementById('editImage');
            editImageElement.style.transform = 'rotate(0deg)';

            // Refresh the display
            filterAndDisplayImages();

            alert('Image rotation applied to display. Note: This is a temporary rotation that will be visible during this session.');

            // Close the edit modal
            const editModal = bootstrap.Modal.getInstance(document.getElementById('editImageModal'));
            editModal.hide();
        }

        // Function to delete current image from edit modal
        window.deleteCurrentImage = function () {
            if (!currentEditImage) {
                alert('No image selected for deletion!');
                return;
            }

            if (confirm('Are you sure you want to delete this image?')) {
                deleteImage(currentEditImage.name);

                // Close the edit modal
                const editModal = bootstrap.Modal.getInstance(document.getElementById('editImageModal'));
                editModal.hide();
            }
        }
    </script>

    <script>
        // Update user ID display in the navbar
        const userIdDisplay = document.getElementById('userIdDisplay');
        const currentUserId = localStorage.getItem('currentUserId');

        if (userIdDisplay && currentUserId) {
            userIdDisplay.textContent = `User ID: ${currentUserId} ${getEmojiForUserId(currentUserId)}`;
            userIdDisplay.classList.remove('d-none');
        }
    </script>
    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
